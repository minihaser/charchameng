name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Charchameng APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache git zip unzip \
            autoconf automake libtool pkg-config \
            libncurses-dev libffi-dev libssl-dev \
            zlib1g-dev cmake

      - name: Install buildozer + cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          cd $HOME/.buildozer/android/platform/android-sdk/licenses
          printf "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > android-sdk-license
          printf "\n84831b9409646a918e30573bab4c9c91346d8abd\n" > android-sdk-preview-license
          printf "\n601085b94cd77f0b54ff86406957099ebe79c4d6\n" > android-googletv-license
          printf "\n859f317696f67ef3d7f30a50a5560e7834b43903\n" > android-sdk-arm-dbt-license
          printf "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a\n" > google-gdk-license
          printf "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d\n" > mips-android-sysimage-license

      - name: Cache buildozer files
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Charchameng-debug-apk
          path: bin/*.apk
          if-no-files-found: error
