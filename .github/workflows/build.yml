name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:    # qo'lda ham ishga tushirish mumkin

jobs:
  build:
    name: Build Charchameng APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache git zip unzip \
            autoconf automake libtool pkg-config \
            libncurses-dev libffi-dev libssl-dev \
            zlib1g-dev cmake

      - name: Install buildozer + cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Cache buildozer files
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Charchameng-debug-apk
          path: bin/*.apk
          if-no-files-found: error
