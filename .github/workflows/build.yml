name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Charchameng APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache git zip unzip \
            autoconf automake libtool pkg-config \
            libncurses-dev libffi-dev libssl-dev \
            zlib1g-dev cmake

      - name: Install buildozer + cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Pre-install Android SDK at buildozer's path
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"

          # Download Android command-line tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools "$SDK_DIR/cmdline-tools/latest"
          rm cmdline-tools.zip

          # Symlink tools/ for buildozer 1.5.0 compatibility (it looks at old path)
          ln -sf "$SDK_DIR/cmdline-tools/latest" "$SDK_DIR/tools"

          # Accept ALL licenses (pipe yes to every prompt)
          yes 2>/dev/null | "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true

          # Pre-install required SDK components
          "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" > /dev/null

          # Set ANDROID_HOME for buildozer
          echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
          echo "ANDROIDSDK=$SDK_DIR" >> $GITHUB_ENV

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Charchameng-debug-apk
          path: bin/*.apk
          if-no-files-found: error
